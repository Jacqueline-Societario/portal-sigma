<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Acesso Negado — Portal Societário Sigma</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; color: #333;
         display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.1);
    padding: 48px 40px;
    max-width: 440px;
    width: 100%;
    text-align: center;
  }
  .icon { font-size: 56px; margin-bottom: 20px; }
  h1 { font-size: 22px; font-weight: 700; color: #A72C31; margin-bottom: 10px; }
  p { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 28px; }
  a.btn {
    display: inline-block;
    background: #A72C31;
    color: #fff;
    padding: 11px 28px;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: background .2s;
  }
  a.btn:hover { background: #8a2228; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔒</div>
  <h1>Acesso Restrito</h1>
  <p>Você não tem permissão para acessar esta ferramenta.<br>
     Entre em contato com a administradora para solicitar acesso.</p>
  <a href="/" class="btn">Voltar ao Início</a>
</div>
</body>
</html>
